<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diyabetik Ayakkabı AR Kartvizit</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.min.js"></script>
  <style>
    .arjs-loader {
      height: 100%; width: 100%; position: absolute; top: 0; left: 0;
      background-color: rgba(0, 0, 0, 0.8); z-index: 9999; display: flex;
      justify-content: center; align-items: center; color: white; font-family: system-ui;
    }
  </style>
</head>
<body style="margin: 0; overflow: hidden;">
  
  <div class="arjs-loader">
    <div>Kamera açılıyor... Kartviziti kameraya tutun</div>
  </div>

  <!-- 
    ÖNEMLİ: target.mind dosyasını oluşturman lazım. 
    1. Kartvizit tasarımını PNG/JPG yap
    2. https://hiukim.github.io/mind-ar-js-doc/tools/compile gir
    3. Görseli yükle → target.mind indir → GitHub’a model.glb yanına at
  -->
  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
    renderer="logarithmicDepthBuffer: true;"
    vr-mode-ui="enabled: false">
    
    <!-- Kartvizit marker’ı. target.mind dosyasını sen oluşturacaksın -->
    <a-marker type="pattern" url="kartvizit.patt">
      
      <!-- Ayakkabı modeli. Kartvizitin üstünde durur -->
      <a-entity 
        gltf-model="url(model.glb)"
        scale="0.5 0.5"
        position="0 0.1 0"
        rotation="0 0 0"
        animation-mixer>
      </a-entity>
      
      <!-- Hotspot: Çıkarılabilir Taban yazısı -->
      <a-text 
        value="Cikarilabilir Taban" 
        position="0 0.8 0" 
        align="center" 
        color="#007AFF" 
        width="3"
        font="https://cdn.aframe.io/fonts/Roboto-msdf.json">
      </a-text>
      
      <!-- Dönen halka efekti -->
      <a-ring 
        position="0 0 0" 
        radius-inner="0.4" 
        radius-outer="0.45" 
        color="#00FF00"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
      </a-ring>
      
    </a-marker>
    
    <a-entity camera></a-entity>
  </a-scene>
  
  <script>
    // Loader’ı gizle
    document.querySelector('a-scene').addEventListener('loaded', () => {
      document.querySelector('.arjs-loader').style.display = 'none';
    });
  </script>
</body>
</html>
