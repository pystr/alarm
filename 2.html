<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebXR Ayakkabı Demo</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f4; }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        
        /* 3D Görüntüleyici Boyutları */
        model-viewer {
            width: 100%;
            height: 80vh;
            background-color: #ffffff;
            --poster-color: transparent;
        }

        /* AR Butonu Tasarımı */
        #ar-button {
            background-image: url(https://modelviewer.dev/assets/ic_view_in_ar_new_googblue_48dp.png);
            background-repeat: no-repeat;
            background-size: 20px 20px;
            background-position: 12px 50%;
            background-color: #fff;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            bottom: 32px;
            padding: 0px 16px 0px 40px;
            font-family: Roboto Regular, Helvetica Neue, sans-serif;
            font-size: 14px;
            color:#4285f4;
            height: 36px;
            line-height: 36px;
            border-radius: 18px;
            border: 1px solid #DADCE0;
            cursor: pointer;
        }

        .info { padding: 20px; text-align: center; }
        h1 { margin: 0; color: #333; }
        p { color: #666; }
    </style>
</head>
<body>

    <div class="container">
        <div class="info">
            <h1>Ayakkabı Demo V1</h1>
            <p>3D modeli inceleyin veya odanıza yerleştirin</p>
        </div>

        <model-viewer 
            src="model.glb" 
            ios-src="model.usdz" 
            alt="3D Ayakkabı Modeli" 
            ar 
            ar-modes="webxr scene-viewer quick-look" 
            camera-controls 
            auto-rotate 
            shadow-intensity="1.5" 
            exposure="1" 
            environment-image="neutral">
            
            <button slot="ar-button" id="ar-button">
                GERÇEK DÜNYADA GÖR
            </button>

        </model-viewer>
    </div>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</body>
</html>
